name: Sync CTAN tlnet

on:
  schedule:
    - cron: "0 0 * * *" # daily at 00:00 UTC
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    permissions:
      actions: write # needed for gh cache delete

    env:
      RCLONE_CONFIG_R2_TYPE: s3
      RCLONE_CONFIG_R2_PROVIDER: Cloudflare
      RCLONE_CONFIG_R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      RCLONE_CONFIG_R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      RCLONE_CONFIG_R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
      RCLONE_CONFIG_R2_NO_CHECK_BUCKET: "true"
      STAGING_DIR: $HOME/tlnet

    steps:
      - name: Checkout repo
        uses: actions/checkout@HEAD

      - name: Install rclone and cmark
        run: |
          curl -fsSL https://rclone.org/install.sh | sudo bash
          sudo apt-get install -y cmark
          mkdir -p ~/.config/rclone
          touch ~/.config/rclone/rclone.conf
          rclone version
          rsync --version

      - name: Create staging directory
        run: mkdir -p "$STAGING_DIR"

      - name: Restore tlnet cache
        id: cache-restore
        uses: actions/cache/restore@HEAD
        with:
          path: ${{ env.STAGING_DIR }}
          key: tlnet-${{ runner.os }}

      - name: Report cache status
        run: |
          if [ "${{ steps.cache-restore.outputs.cache-hit }}" = "true" ]; then
            echo "Cache hit — rsync will only transfer the delta."
            du -sh "$STAGING_DIR" || true
          else
            echo "Cache miss — rsync will do a full download."
          fi

      - name: Rsync CTAN tlnet to local staging
        run: |
          # --itemize-changes prints one line per changed file:
          #   >f+++++++++ path/to/new-or-changed-file
          #   >L+++++++++ path/to/new-or-changed-symlink
          #   *deleting   path/to/removed-file-or-symlink
          # Redirect all output to the changes file; no progress or stats.
          rsync \
            --archive \
            --delete \
            --delete-excluded \
            --hard-links \
            --partial \
            --itemize-changes \
            --exclude='/archive/*.doc.tar.xz' \
            --exclude='/archive/*.doc.*.tar.xz' \
            --exclude='/archive/*.source.tar.xz' \
            --exclude='/archive/*.source.*.tar.xz' \
            --exclude='/update-tlmgr-*' \
            --exclude='/archive/*.amd64-freebsd.tar.xz' \
            --exclude='/archive/*.amd64-freebsd.*.tar.xz' \
            --exclude='/archive/*.amd64-netbsd.tar.xz' \
            --exclude='/archive/*.amd64-netbsd.*.tar.xz' \
            --exclude='/archive/*.armhf-linux.tar.xz' \
            --exclude='/archive/*.armhf-linux.*.tar.xz' \
            --exclude='/archive/*.i386-freebsd.tar.xz' \
            --exclude='/archive/*.i386-freebsd.*.tar.xz' \
            --exclude='/archive/*.i386-linux.tar.xz' \
            --exclude='/archive/*.i386-linux.*.tar.xz' \
            --exclude='/archive/*.i386-netbsd.tar.xz' \
            --exclude='/archive/*.i386-netbsd.*.tar.xz' \
            --exclude='/archive/*.i386-solaris.tar.xz' \
            --exclude='/archive/*.i386-solaris.*.tar.xz' \
            --exclude='/archive/*.x86_64-cygwin.tar.xz' \
            --exclude='/archive/*.x86_64-cygwin.*.tar.xz' \
            --exclude='/archive/*.x86_64-darwinlegacy.tar.xz' \
            --exclude='/archive/*.x86_64-darwinlegacy.*.tar.xz' \
            --exclude='/archive/*.x86_64-solaris.tar.xz' \
            --exclude='/archive/*.x86_64-solaris.*.tar.xz' \
            rsync://rsync.dante.ctan.org/CTAN/systems/texlive/tlnet/ \
            "$STAGING_DIR/" \
            > /tmp/rsync-changes.txt

      - name: Report staging size
        run: du -sh "$STAGING_DIR"

      # actions/cache has no built-in overwrite support — if the key already
      # exists, cache/save silently skips saving. To force an update we must
      # first delete the existing entry, then save under the same key.
      # The '|| true' on delete is intentional: the first-ever run has no
      # cache entry to delete, and we don't want that to fail the workflow.
      - name: Delete old cache entry
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh cache delete tlnet-${{ runner.os }} \
            --repo ${{ github.repository }} || true

      - name: Save tlnet cache
        uses: actions/cache/save@HEAD
        with:
          path: ${{ env.STAGING_DIR }}
          key: tlnet-${{ runner.os }}

      # Replace each symlink foo.tar.xz -> foo.r12345.tar.xz with a real
      # copy of the target, then delete the versioned file. After this step,
      # staging contains only unversioned filenames as real files.
      - name: Resolve symlinks in staging
        run: python3 resolve_symlinks.py "$STAGING_DIR"

      - name: Parse rsync changes
        run: |
          # >f = new/updated regular file; >L = new/updated symlink
          # After symlink resolution both map to real files in staging.
          # Only include paths that actually exist in staging now.
          grep '^>[fL]' /tmp/rsync-changes.txt \
            | awk '{print $2}' \
            | while IFS= read -r f; do
                [ -e "$STAGING_DIR/$f" ] && echo "$f"
              done > /tmp/to-upload.txt || true

      - name: Build directory index pages
        run: |
          python3 build_indexes.py \
            "$STAGING_DIR" \
            /tmp/to-upload.txt \
            index_template.html \
            README.md

      - name: Check for unexpected platforms in archive
        run: python3 check_platforms.py "$STAGING_DIR"

      - name: Verify checksums
        run: bash verify_checksums.sh "$STAGING_DIR"

      - name: Upload changed files to R2
        run: |
          if [ ! -s /tmp/to-upload.txt ]; then
            echo "Nothing to upload."
            exit 0
          fi
          rclone copy \
            "$STAGING_DIR/" \
            r2:${{ secrets.R2_BUCKET_NAME }} \
            --files-from /tmp/to-upload.txt \
            --no-traverse \
            --transfers 8 \
            --stats 60s \
            --stats-one-line \
            --use-mmap \
            --retries 5 \
            --low-level-retries 10 \
            --retries-sleep 30s \
            --log-level INFO

      - name: Final sync to R2 (size-only, safety net)
        run: |
          rclone sync \
            "$STAGING_DIR/" \
            r2:${{ secrets.R2_BUCKET_NAME }} \
            --size-only \
            --transfers 8 \
            --checkers 16 \
            --stats 60s \
            --stats-one-line \
            --use-mmap \
            --retries 5 \
            --low-level-retries 10 \
            --retries-sleep 30s \
            --log-level INFO

      - name: Print bucket summary
        if: always()
        run: |
          echo "Sync completed at $(date -u)"
          rclone size r2:${{ secrets.R2_BUCKET_NAME }} --json 2>/dev/null \
            | python3 -c "
          import sys, json
          d = json.load(sys.stdin)
          gb = d['bytes'] / 1024**3
          print(f'Bucket: {gb:.2f} GB, {d[\"count\"]} files')
          " || true
