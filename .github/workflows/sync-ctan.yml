name: Sync CTAN tlnet

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    permissions:
      actions: write   # needed for gh cache delete

    env:
      RCLONE_CONFIG_R2_TYPE: s3
      RCLONE_CONFIG_R2_PROVIDER: Cloudflare
      RCLONE_CONFIG_R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      RCLONE_CONFIG_R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      RCLONE_CONFIG_R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
      RCLONE_CONFIG_R2_NO_CHECK_BUCKET: "true"
      STAGING_DIR: $HOME/tlnet

    steps:
      - name: Install rclone
        run: |
          curl -fsSL https://rclone.org/install.sh | sudo bash
          rclone version
          rsync --version

      - name: Create staging directory
        run: mkdir -p "$STAGING_DIR"

      # Key is intentionally static: we always want to restore+overwrite
      # the same entry rather than accumulate a new cache per run.
      - name: Restore tlnet cache
        id: cache-restore
        uses: actions/cache/restore@v4
        with:
          path: ${{ env.STAGING_DIR }}
          key: tlnet-${{ runner.os }}

      - name: Remove symlinks left over from cache
        run: find "$STAGING_DIR" -type l -delete

      - name: Report cache status
        run: |
          if [ "${{ steps.cache-restore.outputs.cache-hit }}" = "true" ]; then
            echo "Cache hit — rsync will only transfer the delta."
            du -sh "$STAGING_DIR" || true
          else
            echo "Cache miss — rsync will do a full download."
          fi

      - name: Rsync CTAN tlnet to local staging
        run: |
          rsync \
            --archive \
            --delete \
            --delete-excluded \
            --hard-links \
            --no-links \
            --partial \
            --stats \
            --exclude='/archive/*.doc.tar.xz' \
            --exclude='/archive/*.doc.*.tar.xz' \
            --exclude='/archive/*.source.tar.xz' \
            --exclude='/archive/*.source.*.tar.xz' \
            rsync://rsync.dante.ctan.org/CTAN/systems/texlive/tlnet/ \
            "$STAGING_DIR/" \
            2>&1 | grep -v "skipping non-regular file"
          exit ${PIPESTATUS[0]}

      - name: Report staging size
        run: |
          du -sh "$STAGING_DIR"
          echo ""
          echo "NOTE: if the size above is close to or over 10 GB, the cache"
          echo "save step below will be skipped by GitHub and every run will"
          echo "do a full rsync download. Consider switching to a persistent VM."

      # Delete the old cache entry before saving the new one.
      # actions/cache has no built-in overwrite; without this step the save
      # is silently skipped when the key already exists.
      - name: Delete old cache entry
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh cache delete tlnet-${{ runner.os }} \
            --repo ${{ github.repository }} || true
          # '|| true' so the step doesn't fail if the cache didn't exist yet

      - name: Save tlnet cache
        uses: actions/cache/save@v4
        with:
          path: ${{ env.STAGING_DIR }}
          key: tlnet-${{ runner.os }}

      - name: Sync staging dir to R2
        run: |
          rclone sync \
            "$STAGING_DIR/" \
            r2:${{ secrets.R2_BUCKET_NAME }} \
            --transfers 8 \
            --checkers 16 \
            --stats 60s \
            --stats-one-line \
            --use-mmap \
            --retries 5 \
            --low-level-retries 10 \
            --retries-sleep 30s \
            --log-level INFO

      - name: Print bucket summary
        if: always()
        run: |
          echo "Sync completed at $(date -u)"
          rclone size r2:${{ secrets.R2_BUCKET_NAME }} --json 2>/dev/null \
            | python3 -c "
          import sys, json
          d = json.load(sys.stdin)
          gb = d['bytes'] / 1024**3
          print(f'Bucket: {gb:.2f} GB, {d[\"count\"]} files')
          " || true
